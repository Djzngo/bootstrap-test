<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Example</title>
    <!-- Bootstrap CSS link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <!-- Example of Bootstrap headings and text classes -->
    <h1 class="display-6">Display 6</h1>
    <p class="lead">This is a paragraph using the lead class.</p>
    <br>
    <p><strong>This should be bold test</strong> and now normal text, <em>then this text should be italic.</em></p>
    <br>
    <p>Thsi is normal text again, <u>then this text should be underlined.</u></p>
    <br>

    <!-- Example of a Bootstrap card -->
    <div class="card" style="width: 18rem;">
        <img src="https://codeinstitute.s3.eu-west-1.amazonaws.com/assets/bootstrap-logo.jpg" class="card-img-top" alt="Bootstrap Logo">
        <div class="card-body">
            <h1 class="h5">Bootsrap Rocks</h1>
            <p class="card-text">Boostrap is a powerful, feature-packed frontend toolkit.</p>
            <a href="https://getbootstrap.com/" class="btn btn-outline-success"><strong>Visit Bootstrap</strong></a>
        </div>
    </div>
    <br>

    <!-- Example of Bootstrap buttons -->
    <button type="button" class="btn btn-primary btn-lg">Primary</button>
    <button type="button" class="btn btn-outline-success">Success</button>
    <!-- Bootstrap JS script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
